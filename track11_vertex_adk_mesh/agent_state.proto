syntax = "proto3";

package adk.mesh.v1;

message AgentStateContext {
  string agent_id = 1;
  string session_id = 2;
  int64 sequence_number = 3;
  map<string, string> internal_state = 4;
  string current_intent = 5;
  int64 timestamp_utc = 6;
}

message CommitStateRequest {
  AgentStateContext state = 1;
}

message CommitStateResponse {
  bool success = 1;
  int64 spanner_commit_timestamp = 2;
  string error_message = 3;
}
