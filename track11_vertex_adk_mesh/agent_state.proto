syntax = "proto3";

package adk_mesh;

message TokenUsage {
    int32 prompt_tokens = 1;
    int32 completion_tokens = 2;
    int32 total_tokens = 3;
}

message MemoryEntry {
    string role = 1;
    string text = 2;
}

message TensorMetadata {
    int32 layers = 1;
    int32 heads = 2;
    int32 head_dim = 3;
    string kv_cache_address = 4;
    int64 bytes_allocated = 5;
}

message AgentStatePayload {
    string session_id = 1;
    string agent_role = 2;
    int32 turn_index = 3;
    TokenUsage token_usage = 4;
    repeated string active_constraints = 5;
    repeated MemoryEntry conversational_memory = 6;
    TensorMetadata tensor_metadata = 7;
    int32 chunk_index = 8;        // For streaming tracking
    bool is_last_chunk = 9;       // To signal end of stream
}

message TransferStatus {
    string status_message = 1;
    bool success = 2;
    int32 last_processed_chunk = 3; // For checkpointing and recovery
}

message CheckpointRequest {
    string session_id = 1;
}

message CheckpointResponse {
    int32 last_processed_chunk = 1;
    bool session_exists = 2;
}

// Raft Consensus Messages for Track 11 split-brain recovery
message VoteRequest {
    int32 term = 1;
    string candidate_id = 2;
    int32 last_log_index = 3;
    int32 last_log_term = 4;
}

message VoteResponse {
    int32 term = 1;
    bool vote_granted = 2;
}

message LogEntry {
    int32 term = 1;
    string command = 2;
    string data = 3;
}

message AppendEntriesRequest {
    int32 term = 1;
    string leader_id = 2;
    int32 prev_log_index = 3;
    int32 prev_log_term = 4;
    repeated LogEntry entries = 5;
    int32 leader_commit = 6;
}

message AppendEntriesResponse {
    int32 term = 1;
    bool success = 2;
    int32 match_index = 3;
}

service AgentStateService {
    rpc TransferState(stream AgentStatePayload) returns (TransferStatus);
    rpc GetCheckpoint(CheckpointRequest) returns (CheckpointResponse);
}

service RaftService {
    rpc RequestVote(VoteRequest) returns (VoteResponse);
    rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}
